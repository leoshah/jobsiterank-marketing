<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1B22"/>
      <stop offset="100%" stop-color="#1E2A33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo chip -->
  <g transform="translate(80, 80)">
    <rect width="64" height="64" rx="14" fill="#FFFFFF"/>
    <text x="32" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0E1B22">JR</text>
  </g>
  <text x="160" y="123" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="600" fill="#FFFFFF">JobsiteRank</text>

  <!-- Eyebrow pill -->
  <g transform="translate(80, 230)">
    <rect width="280" height="44" rx="22" fill="#10B981" fill-opacity="0.15"/>
    <circle cx="22" cy="22" r="4" fill="#10B981"/>
    <text x="38" y="29" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#10B981" letter-spacing="1.2">★ BUILT FOR PLUMBERS</text>
  </g>

  <!-- Main headline -->
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Never miss a lead</text>
  <text x="80" y="460" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="700" fill="#10B981" letter-spacing="-2">again.</text>

  <!-- Subhead -->
  <text x="80" y="535" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#FFFFFF" fill-opacity="0.7">Free conversion website + missed-call text-back +</text>
  <text x="80" y="568" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#FFFFFF" fill-opacity="0.7">review automation. Starting at $297/month.</text>

  <!-- Star rating bottom right -->
  <g transform="translate(900, 540)">
    <text x="0" y="20" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#F59E0B">★ ★ ★ ★ ★</text>
    <text x="0" y="48" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" fill-opacity="0.6">4.9 across 100+ shops</text>
  </g>

  <!-- jobsiterank.com bottom-left small -->
  <text x="80" y="608" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#10B981" letter-spacing="1.5">JOBSITERANK.COM</text>
</svg>
